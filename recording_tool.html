<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣國語錄音標記工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f8ef7;
    --accent-dim: #2d5299;
    --red: #e05252;
    --green: #4caf7d;
    --text: #e8eaf0;
    --muted: #7a7f9a;
    --radius: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
  }

  .container { max-width: 760px; margin: 0 auto; }

  /* ── Record Panel ── */
  .record-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }

  .recorder-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  #recBtn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--red);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.1s, opacity 0.2s;
  }
  #recBtn:hover { transform: scale(1.06); }
  #recBtn.recording { animation: pulse 1.4s ease-in-out infinite; }
  #recBtn svg { pointer-events: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  #timer {
    font-size: 22px;
    font-variant-numeric: tabular-nums;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
    min-width: 60px;
  }

  #canvas {
    flex: 1;
    height: 48px;
    border-radius: 4px;
    background: var(--surface2);
  }

  .status-row {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    height: 16px;
  }
  .status-row.active { color: var(--accent); }

  /* Preview after recording */
  #previewSection {
    display: none;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  #previewSection.show { display: block; }

  .preview-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  audio { width: 100%; height: 32px; border-radius: 4px; }

  /* Transcription input */
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .input-wrap label {
    font-size: 12px;
    color: var(--muted);
  }

  #transcription {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    padding: 10px 12px;
    width: 100%;
    resize: vertical;
    min-height: 44px;
    transition: border-color 0.15s;
    font-family: inherit;
  }
  #transcription:focus {
    outline: none;
    border-color: var(--accent);
  }
  #transcription::placeholder { color: var(--muted); }

  .btn {
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover { opacity: 0.87; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-danger { background: #3a1a1a; color: var(--red); border: 1px solid #5c2222; }
  .btn-export { background: var(--green); color: #fff; font-size: 15px; padding: 12px 24px; }

  /* ── List ── */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .list-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .count-badge {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 99px;
  }

  #recordingList {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .rec-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 36px 1fr auto;
    gap: 10px;
    align-items: center;
  }

  .rec-num {
    font-size: 12px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    text-align: center;
    font-weight: 600;
  }

  .rec-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

  .rec-filename {
    font-size: 11px;
    color: var(--accent);
    font-family: 'SF Mono', monospace;
  }

  .rec-text {
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .rec-text.empty { color: var(--muted); font-style: italic; }

  .rec-actions { display: flex; gap: 6px; align-items: center; }

  .icon-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
    transition: color 0.15s, border-color 0.15s;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); }
  .icon-btn.del:hover { color: var(--red); border-color: var(--red); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── Export bar ── */
  .export-bar {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    justify-content: flex-end;
  }

  .export-info {
    font-size: 12px;
    color: var(--muted);
  }

  /* Import section */
  .import-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .import-row label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  #importCsv {
    flex: 1;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    cursor: pointer;
  }
  #importCsv::-webkit-file-upload-button { display: none; }
  #importCsv::before {
    content: '選擇現有 metadata.csv 繼續標記 →';
    font-size: 12px;
    color: var(--muted);
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 14px;
    color: var(--text);
    transition: transform 0.3s ease;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Inline edit */
  .rec-text[contenteditable] {
    outline: none;
    border-bottom: 1px solid var(--accent);
    white-space: normal;
    overflow: visible;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎙 台灣國語錄音標記工具</h1>
  <p class="subtitle">輸出格式：16kHz mono PCM WAV + metadata.csv（HuggingFace audiofolder 相容）</p>

  <!-- Record Panel -->
  <div class="record-panel">
    <div class="recorder-row">
      <button id="recBtn" title="開始/停止錄音">
        <!-- Mic icon -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8"  y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <span id="timer">00:00</span>
      <canvas id="canvas"></canvas>
    </div>
    <div id="statusRow" class="status-row">點擊麥克風開始錄音</div>

    <div id="previewSection">
      <div class="preview-label">預覽錄音</div>
      <audio id="previewAudio" controls></audio>
    </div>

    <div class="input-row">
      <div class="input-wrap">
        <label for="transcription">轉錄文字</label>
        <textarea id="transcription" placeholder="輸入這段錄音的台語文字（錄音完成後填寫）..." rows="2"></textarea>
      </div>
      <button class="btn btn-primary" id="addBtn" disabled>加入清單</button>
    </div>

    <div class="import-row">
      <label>續接舊資料：</label>
      <input type="file" id="importCsv" webkitdirectory style="opacity:0.01; position:absolute; pointer-events:none;">
      <button class="btn btn-ghost" style="font-size:12px;" onclick="document.getElementById('importCsv').click()">
        匯入資料夾（custom_data/）
      </button>
      <span id="importStatus" style="font-size:12px; color:var(--muted);"></span>
    </div>
  </div>

  <!-- List -->
  <div class="list-header">
    <span class="list-title">已標記清單</span>
    <span class="count-badge" id="countBadge">0 筆</span>
  </div>
  <div id="recordingList">
    <div class="empty-state">尚無錄音，開始錄第一筆吧 ↑</div>
  </div>

  <div class="export-bar">
    <span class="export-info" id="exportInfo"></span>
    <button class="btn btn-export" id="exportBtn" disabled>⬇ 匯出 ZIP</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────
// State
// ──────────────────────────────────────────
let recordings = [];   // { id, filename, wavBlob, transcription }
let counter = 1;       // auto-increment filename index
let mediaStream = null;
let mediaRecorder = null;
let chunks = [];
let timerInterval = null;
let startTime = 0;
let analyser = null;
let animFrameId = null;
let pendingBlob = null;  // WAV blob waiting to be added

const TARGET_SAMPLE_RATE = 16000;

// ──────────────────────────────────────────
// DOM refs
// ──────────────────────────────────────────
const recBtn        = document.getElementById('recBtn');
const timerEl       = document.getElementById('timer');
const canvasEl      = document.getElementById('canvas');
const statusRow     = document.getElementById('statusRow');
const previewSec    = document.getElementById('previewSection');
const previewAudio  = document.getElementById('previewAudio');
const transcription = document.getElementById('transcription');
const addBtn        = document.getElementById('addBtn');
const listEl        = document.getElementById('recordingList');
const countBadge    = document.getElementById('countBadge');
const exportBtn     = document.getElementById('exportBtn');
const exportInfo    = document.getElementById('exportInfo');
const importCsv     = document.getElementById('importCsv');
const importStatus  = document.getElementById('importStatus');
const toastEl       = document.getElementById('toast');
const ctx2d         = canvasEl.getContext('2d');

// ──────────────────────────────────────────
// WAV encoder  (PCM 16-bit mono)
// ──────────────────────────────────────────
function encodeWAV(pcmFloat32, sampleRate) {
  const numSamples = pcmFloat32.length;
  const byteRate   = sampleRate * 2;        // 1 channel * 16-bit
  const buffer     = new ArrayBuffer(44 + numSamples * 2);
  const view       = new DataView(buffer);

  const write = (off, str) => [...str].forEach((c, i) => view.setUint8(off + i, c.charCodeAt(0)));

  write(0,  'RIFF');
  view.setUint32(4,  36 + numSamples * 2, true);
  write(8,  'WAVE');
  write(12, 'fmt ');
  view.setUint32(16, 16, true);          // chunk size
  view.setUint16(20, 1,  true);          // PCM
  view.setUint16(22, 1,  true);          // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate,   true);
  view.setUint16(32, 2,  true);          // block align
  view.setUint16(34, 16, true);          // 16-bit
  write(36, 'data');
  view.setUint32(40, numSamples * 2, true);

  let offset = 44;
  for (let i = 0; i < numSamples; i++, offset += 2) {
    const s = Math.max(-1, Math.min(1, pcmFloat32[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

// ──────────────────────────────────────────
// Resample via OfflineAudioContext
// ──────────────────────────────────────────
async function resampleToMono16k(arrayBuffer) {
  const decodeCtx  = new AudioContext();
  const decoded    = await decodeCtx.decodeAudioData(arrayBuffer.slice(0));
  await decodeCtx.close();

  const numFrames  = Math.ceil(decoded.duration * TARGET_SAMPLE_RATE);
  const offlineCtx = new OfflineAudioContext(1, numFrames, TARGET_SAMPLE_RATE);

  // Mix down to mono if stereo
  const source = offlineCtx.createBufferSource();

  if (decoded.numberOfChannels === 1) {
    source.buffer = decoded;
  } else {
    // Mix stereo → mono
    const monoBuffer = offlineCtx.createBuffer(1, decoded.length, decoded.sampleRate);
    const monoData   = monoBuffer.getChannelData(0);
    const left  = decoded.getChannelData(0);
    const right = decoded.getChannelData(1);
    for (let i = 0; i < left.length; i++) monoData[i] = (left[i] + right[i]) * 0.5;
    source.buffer = monoBuffer;
  }

  source.connect(offlineCtx.destination);
  source.start();
  const resampled = await offlineCtx.startRendering();
  return resampled.getChannelData(0);
}

// ──────────────────────────────────────────
// Timer
// ──────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }

function startTimer() {
  startTime = Date.now();
  timerEl.textContent = '00:00';
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    timerEl.textContent = `${pad(Math.floor(elapsed / 60))}:${pad(elapsed % 60)}`;
  }, 500);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

// ──────────────────────────────────────────
// Waveform visualizer
// ──────────────────────────────────────────
function drawWaveform() {
  const W = canvasEl.width;
  const H = canvasEl.height;
  ctx2d.clearRect(0, 0, W, H);

  if (!analyser) {
    // Idle: flat line
    ctx2d.strokeStyle = '#2e3350';
    ctx2d.lineWidth = 1.5;
    ctx2d.beginPath();
    ctx2d.moveTo(0, H / 2);
    ctx2d.lineTo(W, H / 2);
    ctx2d.stroke();
    return;
  }

  const bufLen = analyser.frequencyBinCount;
  const data   = new Uint8Array(bufLen);
  analyser.getByteTimeDomainData(data);

  ctx2d.strokeStyle = '#4f8ef7';
  ctx2d.lineWidth   = 1.5;
  ctx2d.beginPath();
  const step = W / bufLen;
  for (let i = 0; i < bufLen; i++) {
    const y = ((data[i] / 128) - 1) * (H / 2) + H / 2;
    i === 0 ? ctx2d.moveTo(i * step, y) : ctx2d.lineTo(i * step, y);
  }
  ctx2d.stroke();
  animFrameId = requestAnimationFrame(drawWaveform);
}

function resizeCanvas() {
  canvasEl.width  = canvasEl.offsetWidth;
  canvasEl.height = canvasEl.offsetHeight;
  drawWaveform();
}

window.addEventListener('pagehide', () => {
  if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
});
window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 0);

// ──────────────────────────────────────────
// Record button
// ──────────────────────────────────────────
recBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecording();
  } else {
    await startRecording();
  }
});

async function startRecording() {
  pendingBlob = null;
  addBtn.disabled = true;
  previewSec.classList.remove('show');
  transcription.value = '';

  if (!mediaStream || mediaStream.getTracks().every(t => t.readyState === 'ended')) {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    } catch (e) {
      setStatus('⚠ 無法取得麥克風權限', false);
      return;
    }
  }

  // Analyser for waveform
  const audioCtx = new AudioContext();
  const source   = audioCtx.createMediaStreamSource(mediaStream);
  analyser        = audioCtx.createAnalyser();
  analyser.fftSize = 1024;
  source.connect(analyser);

  chunks = [];
  mediaRecorder = new MediaRecorder(mediaStream);
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    analyser = null;
    cancelAnimationFrame(animFrameId);
    await audioCtx.close();
    drawWaveform();  // reset to flat

    setStatus('⏳ 處理中…重新取樣至 16kHz mono PCM…', true);

    const rawBlob  = new Blob(chunks, { type: mediaRecorder.mimeType });
    const arrayBuf = await rawBlob.arrayBuffer();

    try {
      const pcm16k = await resampleToMono16k(arrayBuf);
      pendingBlob  = encodeWAV(pcm16k, TARGET_SAMPLE_RATE);
      previewAudio.src = URL.createObjectURL(pendingBlob);
      previewSec.classList.add('show');
      addBtn.disabled = false;
      setStatus(`✓ 完成  ${(pcm16k.length / TARGET_SAMPLE_RATE).toFixed(1)}s  ·  16kHz mono PCM WAV`, true);
      transcription.focus();
    } catch (err) {
      setStatus(`⚠ 處理失敗：${err.message}`, false);
    }
    // Keep mediaStream alive to avoid re-prompting for mic permission
  };

  mediaRecorder.start(100);
  startTimer();
  recBtn.classList.add('recording');
  setStatus('● 錄音中…點擊麥克風停止', true);
  drawWaveform();
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
    stopTimer();
    recBtn.classList.remove('recording');
  }
}

function setStatus(msg, active) {
  statusRow.textContent = msg;
  statusRow.className   = 'status-row' + (active ? ' active' : '');
}

// ──────────────────────────────────────────
// Add to list
// ──────────────────────────────────────────
addBtn.addEventListener('click', () => {
  if (!pendingBlob) return;

  const text     = transcription.value.trim();
  const filename = `rec_${String(counter).padStart(3, '0')}.wav`;
  counter++;

  recordings.push({ id: Date.now(), filename, wavBlob: pendingBlob, transcription: text });
  pendingBlob = null;

  transcription.value = '';
  addBtn.disabled = true;
  previewSec.classList.remove('show');
  previewAudio.src = '';
  timerEl.textContent = '00:00';
  setStatus('已加入清單，可繼續錄下一筆', true);

  renderList();
  toast(`已加入：${filename}`);
});

// Enter in textarea = add (Shift+Enter for newline)
transcription.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !addBtn.disabled) {
    e.preventDefault();
    addBtn.click();
  }
});

// ──────────────────────────────────────────
// Render list
// ──────────────────────────────────────────
function renderList() {
  countBadge.textContent = `${recordings.length} 筆`;

  if (recordings.length === 0) {
    listEl.innerHTML = '<div class="empty-state">尚無錄音，開始錄第一筆吧 ↑</div>';
    exportBtn.disabled = true;
    exportInfo.textContent = '';
    return;
  }

  exportBtn.disabled = false;
  exportInfo.textContent = `${recordings.length} 個 WAV + metadata.csv`;

  listEl.innerHTML = recordings.map((r, i) => `
    <div class="rec-item" data-id="${r.id}">
      <div class="rec-num">${String(i + 1).padStart(2, '0')}</div>
      <div class="rec-body">
        <div class="rec-filename">${r.filename}</div>
        <div class="rec-text ${r.transcription ? '' : 'empty'}"
             title="點兩下可編輯"
             ondblclick="startInlineEdit(this, ${r.id})">
          ${r.transcription || '（未填寫轉錄文字）'}
        </div>
      </div>
      <div class="rec-actions">
        <button class="icon-btn" title="${r.wavBlob ? '播放' : '無音訊（匯入資料）'}" onclick="playRec(${r.id})" ${r.wavBlob ? '' : 'disabled style="opacity:0.3;cursor:not-allowed"'}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </button>
        <button class="icon-btn del" title="刪除" onclick="deleteRec(${r.id})">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
          </svg>
        </button>
      </div>
    </div>
  `).join('');
}

function playRec(id) {
  const r = recordings.find(x => x.id === id);
  if (!r || !r.wavBlob) { toast('此筆為匯入資料，無音訊可播放'); return; }
  const url = URL.createObjectURL(r.wavBlob);
  const a = new Audio(url);
  a.play();
}

function deleteRec(id) {
  recordings = recordings.filter(x => x.id !== id);
  renderList();
}

// Inline edit of transcription text
window.startInlineEdit = (el, id) => {
  const r = recordings.find(x => x.id === id);
  if (!r) return;
  el.contentEditable = 'true';
  el.classList.remove('empty');
  el.textContent = r.transcription;
  el.focus();

  const save = () => {
    el.contentEditable = 'false';
    r.transcription = el.textContent.trim();
    el.textContent = r.transcription || '（未填寫轉錄文字）';
    if (!r.transcription) el.classList.add('empty');
  };
  el.addEventListener('blur', save, { once: true });
  el.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } });
};

// ──────────────────────────────────────────
// Export ZIP
// ──────────────────────────────────────────
exportBtn.addEventListener('click', async () => {
  if (recordings.length === 0) return;

  exportBtn.disabled = true;
  exportBtn.textContent = '⏳ 打包中…';

  const zip = new JSZip();
  const clipsFolder = zip.folder('custom_data');

  // metadata.csv
  const csvRows = ['file_name,transcription'];
  for (const r of recordings) {
    const escaped = r.transcription.replace(/"/g, '""');
    csvRows.push(`${r.filename},"${escaped}"`);
    clipsFolder.file(r.filename, r.wavBlob);
  }
  clipsFolder.file('metadata.csv', csvRows.join('\n'));

  const blob    = await zip.generateAsync({ type: 'blob', compression: 'STORE' });
  const url     = URL.createObjectURL(blob);
  const a       = document.createElement('a');
  a.href        = url;
  a.download    = `custom_data_${new Date().toISOString().slice(0,10)}.zip`;
  a.click();
  URL.revokeObjectURL(url);

  exportBtn.disabled  = false;
  exportBtn.textContent = '⬇ 匯出 ZIP';
  toast(`匯出成功：${recordings.length} 筆錄音`);
});

// ──────────────────────────────────────────
// Import folder (custom_data/) to resume session
// ──────────────────────────────────────────
importCsv.addEventListener('change', async () => {
  const files = Array.from(importCsv.files);
  if (!files.length) return;

  // Build a map of filename → File for WAVs
  const wavFiles = {};
  let csvFile = null;
  for (const f of files) {
    const name = f.name;
    if (name === 'metadata.csv') csvFile = f;
    else if (name.match(/\.wav$/i)) wavFiles[name] = f;
  }

  if (!csvFile) { importStatus.textContent = '⚠ 找不到 metadata.csv'; return; }

  const lines = (await csvFile.text()).trim().split('\n').slice(1);
  let count = 0;
  for (const line of lines) {
    const match = line.match(/^([^,]+),(".*"|[^,]*)$/);
    if (!match) continue;
    const filename = match[1].trim();
    const transcr  = match[2].replace(/^"|"$/g, '').replace(/""/g, '"').trim();
    const wavBlob  = wavFiles[filename]
      ? new Blob([await wavFiles[filename].arrayBuffer()], { type: 'audio/wav' })
      : null;
    recordings.push({ id: Date.now() + count, filename, wavBlob, transcription: transcr });
    const numMatch = filename.match(/(\d+)\.wav$/i);
    if (numMatch) counter = Math.max(counter, parseInt(numMatch[1]) + 1);
    count++;
  }
  const withAudio = Object.keys(wavFiles).length;
  importStatus.textContent = `已匯入 ${count} 筆${withAudio ? `（${withAudio} 個音訊）` : '（無音訊）'}`;
  renderList();
  toast(`已載入 ${count} 筆現有標記`);
  importCsv.value = '';
});

// ──────────────────────────────────────────
// Toast
// ──────────────────────────────────────────
let toastTimer = null;
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2500);
}
</script>

</html>
